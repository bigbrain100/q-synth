<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Q-SYNTH design calculator — sample size &amp; item count for Q methodology</title>
<style>
  :root { --bg:#f6f7f9; --card:#fff; --line:#e3e6ea; --ink:#1c2430; --muted:#5b6673; --accent:#2b6cb0; --good:#1c8a5a; --warn:#b45309; --cons:#e0632f; --opt:#2b6cb0; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--ink); line-height:1.55; }
  header { background:var(--card); border-bottom:1px solid var(--line); padding:16px 24px; display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
  header h1 { margin:0; font-size:19px; }
  header p { margin:4px 0 0; color:var(--muted); font-size:13px; max-width:760px; }
  .lang { flex:0 0 auto; }
  .lang button { border:1px solid var(--line); background:#fff; color:var(--muted); padding:5px 10px; font-size:13px; border-radius:6px; cursor:pointer; }
  .lang button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .wrap { max-width:1000px; margin:20px auto; padding:0 16px; display:grid; grid-template-columns:340px 1fr; gap:18px; }
  @media (max-width:820px){ .wrap { grid-template-columns:1fr; } }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:18px; }
  .card h2 { margin:0 0 12px; font-size:14px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
  label { display:block; margin:12px 0 4px; font-size:13px; font-weight:600; }
  label .hint { font-weight:400; color:var(--muted); font-size:12px; display:block; }
  input[type=number], select { width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:7px; font-size:14px; background:#fff; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  details { margin-top:12px; } details summary { cursor:pointer; font-size:13px; color:var(--accent); }
  .btns { display:flex; gap:8px; margin-top:16px; }
  button.act { flex:1; padding:11px; border:0; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; }
  #go { background:var(--accent); color:#fff; } #go:hover { background:#255a95; }
  #ex { background:#eef1f4; color:var(--ink); border:1px solid var(--line)!important; }
  .out { min-height:60px; }
  .rec { border-left:4px solid var(--good); background:#f0f9f4; padding:12px 14px; border-radius:6px; margin:8px 0; }
  .rec.cons { border-color:var(--cons); background:#fdf3ee; }
  .rec.opt  { border-color:var(--opt); background:#eef5fc; }
  .rec.fail { border-color:var(--warn); background:#fdf6ec; }
  .big { font-size:26px; font-weight:700; }
  .muted { color:var(--muted); font-size:13px; }
  .err { color:#b91c1c; font-weight:600; }
  svg { width:100%; height:auto; display:block; margin-top:6px; }
  .info { max-width:1000px; margin:0 auto 28px; padding:0 16px; }
  .info .card { margin-top:16px; }
  .info h3 { margin:0 0 8px; font-size:15px; }
  .info dl { margin:0; } .info dt { font-weight:700; margin-top:10px; } .info dd { margin:2px 0 0; color:#333; font-size:14px; }
  .info ol { margin:6px 0 0; padding-left:20px; } .info li { margin:4px 0; }
  .info .eg { background:#eef5fc; border-left:4px solid var(--accent); padding:12px 14px; border-radius:6px; }
  code { background:#eef1f4; padding:1px 5px; border-radius:4px; font-size:12px; }
  a { color:var(--accent); }
</style>
</head>
<body>
<header>
  <div>
    <h1 data-i18n="title">Q-SYNTH design calculator</h1>
    <p data-i18n="subtitle"></p>
  </div>
  <div class="lang">
    <button id="lang-en" class="active" onclick="setLang('en')">EN</button>
    <button id="lang-zh" onclick="setLang('zh')">繁中</button>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <h2 data-i18n="yourStudy">Your study</h2>
    <label data-i18n="c_l">Expected communality (c)<span class="hint" data-i18n="c_h"></span></label>
    <input id="c" type="number" min="0" max="1" step="0.05" value="0.6">
    <label data-i18n="rho_l">Viewpoint overlap (&rho;)<span class="hint" data-i18n="rho_h"></span></label>
    <input id="rho" type="number" min="0" max="1" step="0.05" value="0.2">
    <div class="row2">
      <div>
        <label data-i18n="M_l">Statements (M)</label>
        <input id="M" type="number" min="2" step="1" value="40">
      </div>
      <div>
        <label data-i18n="t_l">Target recovery</label>
        <input id="target" type="number" min="0" max="1" step="0.05" value="0.90">
      </div>
    </div>
    <details>
      <summary data-i18n="adv">Advanced options</summary>
      <div class="row2" style="margin-top:10px">
        <div><label data-i18n="thr_l">Congruence threshold</label>
          <select id="threshold"><option value="0.85">0.85</option><option value="0.90" selected>0.90</option><option value="0.95">0.95</option></select></div>
        <div><label data-i18n="mode_l">Distribution</label>
          <select id="mode"><option value="forced" selected>forced</option><option value="free">free</option></select></div>
      </div>
      <div class="row2" style="margin-top:10px">
        <div><label data-i18n="ret_l">Retention rule</label>
          <select id="retention"><option value="pa" selected>parallel analysis</option><option value="oracle">oracle (known K)</option></select></div>
        <div><label data-i18n="nl_l">Non-defining sorts</label>
          <select id="nonloaders"><option value="0" selected>none</option><option value="0.2">20%</option></select></div>
      </div>
      <p class="muted" data-i18n="kfix" style="margin-top:10px"></p>
    </details>
    <div class="btns">
      <button id="ex" class="act" data-i18n="loadEg">Load example</button>
      <button id="go" class="act" data-i18n="calc">Calculate</button>
    </div>
  </div>

  <div class="card">
    <h2 data-i18n="rec">Recommendation</h2>
    <div id="out" class="out"></div>
    <div id="chart"></div>
  </div>
</div>

<div class="info">
  <div class="card">
    <h3 data-i18n="howto_h">How to use</h3>
    <ol id="howto"></ol>
  </div>
  <div class="card">
    <h3 data-i18n="params_h">What the inputs mean, and where to get them</h3>
    <dl id="params"></dl>
  </div>
  <div class="card">
    <h3 data-i18n="eg_h">Worked example</h3>
    <div class="eg" id="egbox"></div>
  </div>
  <div class="card">
    <h3 data-i18n="philo_h">"But you don't know the factors yet — isn't this against Q's philosophy?"</h3>
    <div id="philo"></div>
  </div>
  <p class="muted" data-i18n="foot" style="margin-top:14px"></p>
</div>

    adv:'進階選項', thr_l:'契合門檻', mode_l:'分佈', ret_l:'因子保留規則', nl_l:'非定義排序',

    loadEg:'載入範例', calc:'計算', rec:'建議',

    params:[
      ['共同性(c)──受訪者持有觀點有多堅定','定義排序被其因子解釋的比例(負荷的平方,0–1)。<b>怎麼取得:</b>跑一個小型前導,或找一篇近題的已發表 Q 研究;打開它的因子負荷表(KADE、PQMethod 或 qmethod R 套件的輸出),取每個因子的定義排序(被 flag 的那些),把它們的負荷平方後取平均。典型約 0.6;意見強而清楚時約 0.8。'],

      ['題數(M)──你 Q 樣本的大小','參與者要排的陳述句數。<b>它從哪來:</b>這是你自己的設計選擇,由你的 concourse 挑出;計算器會告訴你這個題數夠不夠。每個陳述句都是穩定「人與人相關」的觀察,題目越多越好;40 題以上明顯優於 20。'],
      ['觀點數(K)','你預期的共享觀點(因子)數。目前固定為 3,是模擬表中唯一的值。'],

      ['還原率(計算結果)──「被還原」是什麼意思','在你的設定下,模擬研究中「每一個植入觀點都回來」的百分比:每個還原因子陣列都與其植入陣列夠貼近(Tucker 契合度 ≥ 門檻,預設 0.90)。可讀成:你的因子是研究的真實結構、而非太少排序變出的假象的機率。〔95% CI〕顯示模擬本身的不確定度。'],
      ['契合門檻(進階)','一個還原因子陣列要與植入陣列多接近,才算「還原成功」,以 Tucker 契合係數衡量。0.90 是常用值;0.95 更嚴、0.85 較寬。調高會需要更多排序。'],
      ['分佈(進階)','排序如何成形。<b>強制(forced)</b>是標準 Q 的準常態格子,每個排序都是同一固定形狀(ipsative);<b>自由(free)</b>讓每題各自評分。強制是常規,且在模擬中不傷害還原。'],
      ['因子保留規則(進階)','模擬中「保留幾個因子」如何決定。<b>平行分析(parallel analysis)</b>只保留勝過隨機資料的因子(建議)。<b>oracle</b>假設已知真實因子數、移除保留誤差,是用來看最佳情況的理想化參照。'],
      ['非定義排序(進階)','招募的參與者中,不明確在任何因子上顯著負荷的比例。<b>none</b>假設每個人都定義某因子;<b>20%</b>模擬「有些人未定」的真實研究。非定義者越多,還原略降,故招募時要多加一些。']
    ],
    eg_h:'範例',
    eg:'<b>規劃一個「三種觀點、對某爭議教育政策」的 Q 研究。</b>你預期參與者立場堅定(共同性 c ≈ 0.6)、觀點部分重疊(ρ ≈ 0.3),打算用 40 題,目標還原率 90%。按<b>「載入範例」</b>再按<b>「計算」</b>。工具在兩個最接近的模擬條件之間讀取,建議:若觀點分明約需<b>每因子 6 個定義排序</b>,若重疊則到<b>12 個</b>。所以請規劃約<b>每因子 8–12 個定義排序</b>、三因子約招募<b>30–45 位參與者</b>,而非「每因子 4–5 人」機械法則所暗示的十來人。',
    philo_h:'「都還沒做,怎麼知道有幾個因子?這不是違反 Q 的哲學嗎?」',
    philo:[
      '好問題,答案是「不違反」,有三個理由。',
      '<b>1. Q 本來就在收資料前做設計假設。</b>「要幾位參與者、要幾題」本來就是排序前的決定,而 Brown「每因子 4–5 人」本身就假設了一個因子數來規劃。這個計算器只是把這些既有的假設變得明確、量化。',
      '<b>2. 輸入是「假使…則…」,不是預測。</b>「假使有約三個中等強度的觀點,則我需要每因子約八人。」你是在為一個合理的結構買保險,不是指定結果。可跑幾組情境(不同 K、c、ρ)把設計框起來——這是敏感度分析,不是假設檢定。',
      '<b>3. 它完全不碰分析與詮釋。</b>Q 的 operant 原則管的是「因子如何從資料中萃取、如何整體地以 abduction 詮釋」;這個工具對此隻字不提。它只影響「招幾人、寫幾題」——這本來就得在收資料前決定。真正湧現幾個觀點,你照舊萃取與詮釋:規劃三個,結果湧現四個,你就詮釋四個。',
      '<b>沒有前導或近題研究?</b>那就假設一個小而合理的觀點數(Q 常見 2–4)+ 保守值(c 偏低、ρ 偏高),得到一個對多種可能結構都穩健的設計;多招一點就是對不確定性的便宜保險。不決定 N 和 M 不是選項;用「充分性推理」來決定,比用經驗法則盲猜更站得住腳,也絲毫不減 operant 精神。'
    ],
    foot:'本工具讀一張粗格點的模擬還原表(c ∈ {0.4, 0.6, 0.8}、ρ ∈ {0, 0.4}、M ∈ {20, 40}、每因子排序 ∈ {4, 6, 8, 12}),把輸入 snap 到最近的條件、偏保守。這是「帶著你的主題來讀」的規劃指引,不是死板法則。來源:Q-SYNTH repository。'
  }
};
let LANG = 'en';
function T(){ return I18N[LANG]; }

function setLang(l){
  LANG = l;
  document.documentElement.lang = T().lang_html;
  document.getElementById('lang-en').classList.toggle('active', l==='en');
  document.getElementById('lang-zh').classList.toggle('active', l==='zh');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ const k=el.getAttribute('data-i18n'); if(typeof T()[k]==='string') el.innerHTML = T()[k]; });
  document.getElementById('howto').innerHTML = T().howto.map(s=>`<li>${s}</li>`).join('');
  document.getElementById('params').innerHTML = T().params.map(p=>`<dt>${p[0]}</dt><dd>${p[1]}</dd>`).join('');
  document.getElementById('egbox').innerHTML = T().eg;
  document.getElementById('philo').innerHTML = T().philo.map(s=>`<p>${s}</p>`).join('');
  calc();
}

const rows = (()=>{ const L=CSV.trim().split("\n"), h=L[0].split(","); return L.slice(1).map(l=>{const f=l.split(",");const o={};h.forEach((x,i)=>o[x]=f[i]);return o;}); })();
function snap(v,o,s){const a=[...o].sort((x,y)=>x-y);const b=[...a].reverse().find(g=>g<=v),c=a.find(g=>g>=v);if(b===undefined)return a[0];if(c===undefined)return a[a.length-1];if(b===c)return b;return s==='low'?b:c;}
function recommend(c,rho,M,o){
  const rs=rows.filter(r=>+r.M===M&&+r.c===c&&+r.rho===rho&&r.mode===o.mode&&r.retention===o.retention&&+r.K===K&&r.nonLoaderFrac===String(o.nlf)).sort((a,b)=>+a.perFactorN-+b.perFactorN);
  if(!rs.length) return {none:true};
  const curve=rs.map(r=>({pf:+r.perFactorN,rec:+r[o.recCol]}));
  const hit=rs.find(r=>+r[o.recCol]>=o.target);
  if(hit){const pf=+hit.perFactorN,N=pf*K,recruit=Math.ceil(N/0.8);
    const lo=o.recCol==='rec90'&&hit.rec90_lo?Math.round(+hit.rec90_lo*100):null, hi=o.recCol==='rec90'&&hit.rec90_hi?Math.round(+hit.rec90_hi*100):null;
    return {pf,N,recruit,rec:Math.round(+hit[o.recCol]*100),lo,hi,curve};}
  const b=rs[rs.length-1]; return {fail:true,bestPf:+b.perFactorN,bestRec:Math.round(+b[o.recCol]*100),curve};
}
function fmtRec(label,cls,c,rho,r){
  const t=T();
  if(r.none) return `<div class="rec fail"><b>${label}</b> (c=${c}, ρ=${rho}): ${t.nomatch}</div>`;
  if(r.fail) return `<div class="rec fail"><b>${label}</b> (c=${c}, ρ=${rho}): ${t.fragile(r.bestPf,r.bestRec)}</div>`;
  return `<div class="rec ${cls}"><b>${label}</b> (c=${c}, ρ=${rho})<br>
    <span class="big">${r.pf}</span> ${t.sortsPerFactor} &nbsp;&rarr;&nbsp; ${t.recovery} ${r.rec}%${r.lo!=null?` <span class="muted">[${r.lo}, ${r.hi}] 95% CI</span>`:``}<br>
    <span class="muted">${t.breakdown(r.pf,r.N,r.recruit)}</span></div>`;
}
function chart(series,target){
  const t=T(),W=560,H=300,ml=46,mr=14,mt=16,mb=42,pw=W-ml-mr,ph=H-mt-mb,xs=GRID.pf;
  const xAt=i=>ml+(i/(xs.length-1))*pw, yAt=v=>mt+(1-v)*ph;
  let e=[`<svg viewBox="0 0 ${W} ${H}" font-family="sans-serif" font-size="12">`,`<rect width="${W}" height="${H}" fill="#fff"/>`];
  for(let g=0;g<=10;g+=2){const y=yAt(g/10);e.push(`<line x1="${ml}" y1="${y}" x2="${ml+pw}" y2="${y}" stroke="#eef0f3"/><text x="${ml-6}" y="${y+4}" text-anchor="end" fill="#8a94a0">${g*10}%</text>`);}
  const ty=yAt(target);e.push(`<line x1="${ml}" y1="${ty}" x2="${ml+pw}" y2="${ty}" stroke="#b45309" stroke-dasharray="5 4"/><text x="${ml+pw}" y="${ty-4}" text-anchor="end" fill="#b45309">${t.xTarget} ${Math.round(target*100)}%</text>`);
  e.push(`<line x1="${ml}" y1="${mt}" x2="${ml}" y2="${mt+ph}" stroke="#333"/><line x1="${ml}" y1="${mt+ph}" x2="${ml+pw}" y2="${mt+ph}" stroke="#333"/>`);
  xs.forEach((x,i)=>e.push(`<text x="${xAt(i)}" y="${mt+ph+18}" text-anchor="middle" fill="#5b6673">${x}</text>`));
  e.push(`<text x="${ml+pw/2}" y="${H-4}" text-anchor="middle" fill="#333">${t.xAxis}</text>`);
  series.forEach((s,si)=>{const pts=s.curve.map(p=>`${xAt(xs.indexOf(p.pf))},${yAt(p.rec)}`).join(" ");
    e.push(`<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2.5"/>`);
    s.curve.forEach(p=>e.push(`<circle cx="${xAt(xs.indexOf(p.pf))}" cy="${yAt(p.rec)}" r="3.5" fill="${s.color}"/>`));
    e.push(`<rect x="${ml+8+si*168}" y="${mt+2}" width="12" height="3" fill="${s.color}"/><text x="${ml+24+si*168}" y="${mt+6}" fill="#333">${s.label}</text>`);});
  e.push(`</svg>`); return e.join("");
}
function calc(){
  const t=T(), num=id=>parseFloat(document.getElementById(id).value), val=id=>document.getElementById(id).value;
  const cIn=num('c'),rhoIn=num('rho'),MIn=num('M'),target=num('target');
  const thr=val('threshold'),mode=val('mode'),retention=val('retention'),nlf=val('nonloaders');
  const recCol={'0.85':'rec85','0.90':'rec90','0.95':'rec95'}[thr];
  const out=document.getElementById('out'),chartDiv=document.getElementById('chart'); chartDiv.innerHTML='';
  const errs=[]; [['c',cIn],['ρ',rhoIn],[t.xTarget,target]].forEach(([n,v])=>{ if(!(v>=0&&v<=1)) errs.push(t.err01(n)); }); if(!(MIn>=2)) errs.push(t.errM);
  if(errs.length){ out.innerHTML=`<p class="err">${t.errCheck(errs.join('; '))}</p>`; return; }
  const M=snap(MIn,GRID.M,'low'), cC=snap(cIn,GRID.c,'low'),rC=snap(rhoIn,GRID.rho,'high'),cO=snap(cIn,GRID.c,'high'),rO=snap(rhoIn,GRID.rho,'low');
  const between=cC!==cO||rC!==rO, o={target,recCol,mode,retention,nlf};
  let html=`<p class="muted">${t.readAt(M!==MIn?` (M → ${M})`:'')}${mode}, ${retention}, |φ|≥${thr}.</p>`;
  const rc=recommend(cC,rC,M,o);
  if(between){ const ro=recommend(cO,rO,M,o);
    html+=`<p class="muted">${t.between}</p>`+fmtRec(t.consLabel,'cons',cC,rC,rc)+fmtRec(t.optLabel,'opt',cO,rO,ro)+`<p class="muted">${t.planCons}</p>`;
    out.innerHTML=html; const s=[]; if(rc.curve)s.push({label:`${t.consLabel} (c=${cC},ρ=${rC})`,color:'#e0632f',curve:rc.curve}); if(ro.curve)s.push({label:`${t.optLabel} (c=${cO},ρ=${rO})`,color:'#2b6cb0',curve:ro.curve}); if(s.length)chartDiv.innerHTML=chart(s,target);
  } else { html+=fmtRec(t.recLabel,'',cC,rC,rc); out.innerHTML=html; if(rc.curve)chartDiv.innerHTML=chart([{label:`c=${cC},ρ=${rC}`,color:'#2b6cb0',curve:rc.curve}],target); }
}
function loadExample(){ document.getElementById('c').value='0.6'; document.getElementById('rho').value='0.3'; document.getElementById('M').value='40'; document.getElementById('target').value='0.90'; document.getElementById('threshold').value='0.90'; document.getElementById('mode').value='forced'; document.getElementById('retention').value='pa'; document.getElementById('nonloaders').value='0'; calc(); }
document.getElementById('go').addEventListener('click',calc);
document.getElementById('ex').addEventListener('click',loadExample);
document.querySelectorAll('input,select').forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter')calc();}));
setLang('en');
</script>
